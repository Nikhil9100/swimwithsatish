        /* Custom Animations for Loading State */
        @keyframes fillRing {

            0%, 100% {

            }
        }
        
        @keyframes splashFadeOut {
            0% { opacity: 1; backdrop-filter: blur(8px); }
            100% { opacity: 0; backdrop-filter: blur(0px); visibility: hidden; pointer-events: none; }
        }

            stroke-dasharray: 283;
            animation: fillRing 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

            animation: deepBreathPulse 3s ease-in-out infinite;

<!-- STITCH_SHADER_START:ANIMATION_15 class="absolute inset-0 w-full h-full opacity-60 mix-blend-screen pointer-events-none" -->
<div class="absolute inset-0 w-full h-full opacity-60 mix-blend-screen pointer-events-none" style="display:block;">
<canvas id="shader-canvas-ANIMATION_15" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_15');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
varying vec2 v_texCoord;

// Simple noise function
float random(vec2 st) {
    return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
}

float noise(vec2 st) {
    vec2 i = floor(st);
    vec2 f = fract(st);
    float a = random(i);
    float b = random(i + vec2(1.0, 0.0));
    float c = random(i + vec2(0.0, 1.0));
    float d = random(i + vec2(1.0, 1.0));
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
}

void main() {
    vec2 uv = v_texCoord;
    
    // Create organic water movement
    float wave = noise(uv * 3.0 + u_time * 0.5) * 0.1;
    wave += noise(uv * 5.0 - u_time * 0.3) * 0.05;
    
    // Aqua/Deep Sea colors based on brand
    vec3 color1 = vec3(0.039, 0.086, 0.157); // Deep Navy #0A1628
    vec3 color2 = vec3(0.0, 0.831, 1.0);     // Electric Aqua #00D4FF
    
    // Mix colors based on UV and wave motion
    float mixFactor = uv.y + wave;
    vec3 finalColor = mix(color1, color2 * 0.4, mixFactor);
    
    // Add light "shimmer" at the top
    float shimmer = pow(1.0 - uv.y, 3.0) * 0.2 * noise(uv * 10.0 + u_time);
    finalColor += color2 * shimmer;

    gl_FragColor = vec4(finalColor, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
        // Simulate the 3-second loading sequence and transition
        document.addEventListener('DOMContentLoaded', () => {
            const splashContainer = document.getElementById('splash-container');
            const mainContent = document.getElementById('main-content');

            // Wait 3 seconds for the ring animation to complete, then trigger fade out
            setTimeout(() => {
                splashContainer.classList.add('trigger-fade');
                
                // Slightly before the fade finishes, fade in the main content for a smooth handoff
                setTimeout(() => {
                    mainContent.style.opacity = '1';
                    document.body.classList.remove('overflow-hidden'); // Allow scrolling if needed later
                }, 500);

            }, 3000); // 3 seconds matching the CSS animation duration
        });
